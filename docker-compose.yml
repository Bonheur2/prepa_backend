version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    # Real secrets (DATABASE_URL pointed at Neon, JWT_SECRET, GROQ_API_KEY)
    # live in .env.local -- gitignored, never committed. Populate it from
    # .env.example before running `docker compose up`.
    env_file:
      - .env.local
    ports:
      - '3000:3000'
